<header id="menu">
  <div class="header-wrapper">
    <nav class="main-nav">
      <a href="{{ site.url }}" title="Go to home page" class="logo-link">
        <img width="206" height="50" alt="PM2 logo" src="{{ site.url }}/assets/pm2-logo-1.png" />
      </a>
      <div class="menu">

        <a class="menu-overlay" href="#" title="Close the menu"></a>
        <div class="menu-content">
          <div class="doc-links">

            <a
              href="{{ site.url }}/pricing/"
              title="Go to Pricing"
              class="{% if page.url == '/pricing/' %}current{% endif %}"
            >
              Pricing
            </a>

            <a
              href="{{ site.url }}/contact/"
              title="Contact us"
              class="{% if page.url == '/contact/' %}current{% endif %}"
            >
              Contact
            </a>

            <a
              href="{{ site.url }}/docs/usage/quick-start/"
              title="Go to Documentation"
              class="{% if page.layout == 'docs' %}current{% endif %}"
            >
              Documentation
            </a>

            <a
              href="https://github.com/Unitech/pm2"
              title="PM2 on GitHub"
              class="github-link"
              target="_blank"
              rel="noopener"
            >
              <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor" aria-label="GitHub" role="img">

              <span id="gh-star-badge" style="display:none; align-items:center; gap:7px; background:#21262d; border:1px solid #444c56; border-radius:6px; padding:5px 12px; color:#e6edf3; font-size:14px; line-height:1;">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="#e3b341" aria-hidden="true">
                  <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
                </svg>
                <span>Starred</span>
                <span id="gh-star-count" style="background:#3d444d; border-radius:2em; padding:3px 9px; font-weight:bold;"></span>
              </span>
            </a>
          </div>
          <a
            href="{{ site.register_url }}"
            title="Get started"
            class="button accent-border border-corners inner-shadows"
          >
            Monitor PM2
          </a>
        </div>
      </div>
    </nav>
  </div>
</header>
