name: Keep LLM docs in sync

# Regenerates llms-full.txt, the per-page Markdown mirrors and the
# last_modified_at front-matter whenever the documentation changes,
# and commits the refresh automatically.

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "!docs/**/index.html.md"
      - "_data/nav.yml"
      - "scripts/**"

permissions:
  contents: write
  pages: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git-derived last_modified_at

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate LLM docs
        run: |
          node scripts/update-last-modified.js
          node scripts/build-llms-full.js

      - name: Commit refresh
        id: commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Regenerate llms files and last_modified_at [auto]"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      # Pushes made with GITHUB_TOKEN don't trigger the Pages build,
      # so request it explicitly when the bot committed something.
      - name: Request Pages build
        if: steps.commit.outputs.pushed == 'true'
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
